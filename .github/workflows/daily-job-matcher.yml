name: Daily Job Matcher

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'search'
        type: choice
        options:
          - search
          - test-connection
          - test-write

jobs:
  run-job-matcher:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client

      - name: Run job matcher
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          RUN_MODE: ${{ github.event.inputs.mode || 'search' }}
        run: python scripts/job_matcher.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "Job matcher failed. Check workflow logs."
          exit 1
