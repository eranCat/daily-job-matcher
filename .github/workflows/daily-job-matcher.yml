name: Daily Job Matcher

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  run-job-matcher:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic google-auth-oauthlib google-auth-httplib2 google-api-python-client
      
      - name: Run job matcher
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_ID: 1zk3vAgTwKmcn4xgwrue54KyUqRYSlvrkr9azOWeCKno
        run: python scripts/job_matcher.py
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "Job matcher failed. Check workflow logs."
          exit 1